<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>DIY Photo Guide</title>
  <meta
    name="description"
    content="A quick mobile guide to taking better photos on the go."
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-slide-in {
      animation: slideIn 0.35s ease-out forwards;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
    }
  </style>
</head>
<body class="bg-slate-50">
  <div id="app" class="min-h-screen max-w-md mx-auto bg-slate-50 shadow-2xl flex flex-col"></div>

  <script>
    const app = document.getElementById("app");

    const sections = [
      {
        key: "home",
        tabLabel: "Home",
        pages: [
          {
            stepLabel: "Welcome",
            title: "Take Better Photos on the Go",
            description:
              "This is a quick guide to help you take better pictures wherever you are.",
            cards: [
              {
                icon: "⚙️",
                title: "Set Up",
                detail:
                  "Be ready to capture the shot by checking your camera, phone, and basics before you begin."
              },
              {
                icon: "🎯",
                title: "Get the Shot",
                detail:
                  "Use practical tips and inspiration to make your photos stronger and more intentional."
              },
              {
                icon: "💡",
                title: "Technical Tips",
                detail:
                  "Level up with simple guidance on lighting, composition, and stability."
              }
            ],
            callout:
              "Start with Set Up to be ready to capture shots. Then move to Get the Shot, and finish by leveling up with Technical Tips."
          }
        ]
      },
      {
        key: "setup",
        tabLabel: "Set Up",
        pages: [
          {
            stepLabel: "Page 1",
            title: "Camera Prep",
            description:
              "Start with the basics so you are ready when the moment happens.",
            items: [
              {
                icon: "🔋",
                label: "Charge your camera",
                detail: "Make sure it is fully charged before you head out."
              },
              {
                icon: "💾",
                label: "Clear space",
                detail: "Free up room on your memory card or phone so you do not run out of storage."
              },
              {
                icon: "🪫",
                label: "Bring extra batteries",
                detail: "Extra power can save the day when you are out shooting."
              }
            ]
          },
          {
            stepLabel: "Page 2",
            title: "Phone Details",
            description:
              "If you are using your phone, these small settings make a big difference.",
            items: [
              {
                icon: "📷",
                label: "Use the back camera",
                detail: "The back camera usually gives you better image quality."
              },
              {
                icon: "⚡",
                label: "Disable flash",
                detail: "Flash often makes photos look harsh or flat."
              },
              {
                icon: "🎨",
                label: "Remove filters",
                detail: "Keep your image natural so you have more flexibility later."
              },
              {
                icon: "🔍",
                label: "Disable digital zoom",
                detail: "Move closer instead when possible for better quality."
              }
            ]
          },
          {
            stepLabel: "Page 3",
            title: "Final Check",
            description:
              "Do one last thing before you start shooting.",
            items: [
              {
                icon: "🧼",
                label: "Clean your lens",
                detail: "A quick wipe can make your photos much clearer."
              }
            ],
            callout: "Ready? Next up: Get the Shot."
          }
        ]
      },
      {
        key: "shot",
        tabLabel: "Get the Shot",
        pages: [
          {
            stepLabel: "Page 1",
            title: "Figure Out the Goal of the Photo",
            description:
              "Know what you want the image to say before you tap the shutter.",
            items: [
              {
                icon: "🧭",
                label: "Start with purpose",
                detail: "Decide whether you are capturing a person, a place, a detail, or a feeling."
              },
              {
                icon: "🎯",
                label: "Make one thing important",
                detail: "Give the viewer something clear to focus on."
              }
            ]
          },
          {
            stepLabel: "Page 2",
            title: "Experiment with Angles",
            description:
              "Do not take every photo from the same point of view.",
            items: [
              {
                icon: "⬆️",
                label: "Try above",
                detail: "A higher angle can simplify the scene."
              },
              {
                icon: "⬇️",
                label: "Try below",
                detail: "A lower angle can add drama or interest."
              },
              {
                icon: "↔️",
                label: "Move around",
                detail: "A small change in angle can completely change the shot."
              }
            ]
          },
          {
            stepLabel: "Page 3",
            title: "Use Light and Composition",
            description:
              "Look carefully at what is helping or hurting the photo.",
            items: [
              {
                icon: "☀️",
                label: "Watch the light",
                detail: "Pay attention to where the light is coming from."
              },
              {
                icon: "🖼️",
                label: "Keep the frame simple",
                detail: "A cleaner frame usually makes a stronger image."
              },
              {
                icon: "🚶",
                label: "Move yourself or the subject",
                detail: "Sometimes the easiest fix is just to shift position."
              }
            ]
          },
          {
            stepLabel: "Page 4",
            title: "Focus on the Subject",
            description:
              "Make the main subject obvious and avoid distractions.",
            items: [
              {
                icon: "👀",
                label: "Make the subject clear",
                detail: "The viewer should know what to look at first."
              },
              {
                icon: "🧹",
                label: "Avoid distractions",
                detail: "Check the background for clutter or objects that pull attention away."
              }
            ],
            callout: "Want to level up? Continue to Technical Tips."
          }
        ]
      },
      {
        key: "tech",
        tabLabel: "Technical Tips",
        pages: [
          {
            stepLabel: "Page 1",
            title: "Lighting",
            description:
              "Good light can improve almost any photo.",
            items: [
              {
                icon: "🌤️",
                label: "Use natural light",
                detail: "Natural light is often the easiest and most flattering option."
              },
              {
                icon: "🚫",
                label: "Avoid harsh overhead light",
                detail: "It can create strong shadows and make features look less flattering."
              },
              {
                icon: "↩️",
                label: "Turn toward the light",
                detail: "A simple turn can brighten the subject and improve the shot."
              }
            ]
          },
          {
            stepLabel: "Page 2",
            title: "Composition",
            description:
              "Think about how everything is arranged inside the frame.",
            items: [
              {
                icon: "📐",
                label: "Use spacing and balance",
                detail: "Give the subject room and avoid a cramped frame."
              },
              {
                icon: "➖",
                label: "Remove what is unnecessary",
                detail: "Anything that does not help the image can weaken it."
              },
              {
                icon: "➡️",
                label: "Guide the eye",
                detail: "Use lines, shapes, and placement to lead the viewer."
              }
            ]
          },
          {
            stepLabel: "Page 3",
            title: "Stability",
            description:
              "Sharper photos usually come from steadier hands.",
            items: [
              {
                icon: "🤲",
                label: "Hold steady",
                detail: "Use both hands when you can."
              },
              {
                icon: "🧱",
                label: "Use support",
                detail: "Lean against a wall or rest the phone on something stable."
              },
              {
                icon: "✨",
                label: "Reduce blur",
                detail: "Less motion usually means a cleaner, sharper image."
              }
            ]
          },
          {
            stepLabel: "Final Page",
            title: "Most Important of All",
            description:
              "The best way to improve is to practice.",
            items: [
              {
                icon: "📸",
                label: "Take lots of pictures",
                detail: "The more you practice, the better you will get."
              },
              {
                icon: "🎉",
                label: "Have fun",
                detail: "Enjoy the process and keep experimenting."
              }
            ],
            callout: "Go take lots of pictures and have fun!"
          }
        ]
      }
    ];

    let currentSection = 0;
    let currentPage = 0;

    function render() {
      const activeSection = sections[currentSection];
      const pages = activeSection.pages;
      const page = pages[currentPage];
      const totalPages = pages.length;
      const progress = ((currentPage + 1) / totalPages) * 100;

      const tabsHtml = sections
        .map((section, index) => {
          const active = index === currentSection;
          return `
            <button
              onclick="switchSection(${index})"
              class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all ${
                active
                  ? "bg-white shadow-sm text-slate-900"
                  : "text-slate-500"
              }"
            >
              ${section.tabLabel}
            </button>
          `;
        })
        .join("");

      const itemCards = (page.items || [])
        .map(
          (item) => `
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-5 flex gap-4">
              <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center text-2xl shrink-0">
                ${item.icon}
              </div>
              <div>
                <h3 class="font-bold text-lg text-slate-900 mb-1">${item.label}</h3>
                <p class="text-slate-500 text-sm leading-relaxed">${item.detail}</p>
              </div>
            </div>
          `
        )
        .join("");

      const homeCards = (page.cards || [])
        .map(
          (card) => `
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-5 flex gap-4">
              <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center text-2xl shrink-0">
                ${card.icon}
              </div>
              <div>
                <h3 class="font-bold text-lg text-slate-900 mb-1">${card.title}</h3>
                <p class="text-slate-500 text-sm leading-relaxed">${card.detail}</p>
              </div>
            </div>
          `
        )
        .join("");

      app.innerHTML = `
        <header class="bg-white px-6 pt-12 pb-6 border-b border-slate-100 sticky top-0 z-20">
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-2">
              <div class="bg-slate-900 p-2 rounded-xl text-white text-lg">📸</div>
              <span class="font-bold text-lg tracking-tight">DIY Photo Guide</span>
            </div>
            <span class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">
              ${page.stepLabel} • ${currentPage + 1} of ${totalPages}
            </span>
          </div>

          <div class="flex bg-slate-100 p-1 rounded-2xl mb-4">
            ${tabsHtml}
          </div>

          <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
            <div
              class="h-full bg-slate-900 rounded-full transition-all duration-500"
              style="width:${progress}%"
            ></div>
          </div>
        </header>

        <main class="flex-1 p-6 pb-32 overflow-y-auto">
          <div class="animate-slide-in">
            <h1 class="text-[32px] font-bold text-slate-900 mb-2 leading-tight">
              ${page.title}
            </h1>
            <p class="text-slate-500 text-lg mb-8 leading-relaxed">
              ${page.description}
            </p>

            <div class="space-y-4">
              ${activeSection.key === "home" ? homeCards : itemCards}
            </div>

            ${
              page.callout
                ? `
                <div class="mt-8 bg-amber-50 border border-amber-100 p-5 rounded-3xl">
                  <p class="text-amber-800 font-medium text-sm leading-relaxed">
                    ${page.callout}
                  </p>
                </div>
              `
                : ""
            }
          </div>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-white/90 backdrop-blur-md border-t border-slate-200 z-30">
          <div class="flex gap-4">
            ${
              currentPage > 0
                ? `
                <button
                  onclick="prevPage()"
                  class="w-14 h-14 border border-slate-200 rounded-2xl flex items-center justify-center text-slate-500 text-2xl active:bg-slate-50"
                >
                  ←
                </button>
              `
                : ""
            }

            <button
              onclick="nextPage()"
              class="flex-1 h-14 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg transition-all active:scale-[0.98] ${
                currentPage === totalPages - 1
                  ? "bg-emerald-600 text-white"
                  : "bg-slate-900 text-white"
              }"
            >
              ${
                currentPage === totalPages - 1
                  ? activeSection.key === "tech"
                    ? "You’re Ready"
                    : "Section Complete"
                  : "Next Step"
              }
              <span>→</span>
            </button>
          </div>
        </footer>
      `;
    }

    function switchSection(index) {
      currentSection = index;
      currentPage = 0;
      render();
    }

    function nextPage() {
      const pages = sections[currentSection].pages;
      if (currentPage < pages.length - 1) {
        currentPage++;
      }
      render();
    }

    function prevPage() {
      if (currentPage > 0) {
        currentPage--;
      }
      render();
    }

    render();

    window.switchSection = switchSection;
    window.nextPage = nextPage;
    window.prevPage = prevPage;
  </script>
</body>
</html>
